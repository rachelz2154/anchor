<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anchor - Focus</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #04070c;
    --glass: rgba(255, 255, 255, 0.105);
    --line: rgba(255, 255, 255, 0.18);
    --line-strong: rgba(255, 255, 255, 0.32);
    --text: #f8fbff;
    --muted: rgba(248, 251, 255, 0.58);
    --faint: rgba(248, 251, 255, 0.36);
    --green: #b9ffd9;
    --red: #ffb9bd;
    --blue: #bedfff;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: clamp(18px, 4vw, 48px);
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 14%, rgba(201, 225, 255, 0.24), transparent 24rem),
      radial-gradient(circle at 82% 18%, rgba(178, 255, 217, 0.14), transparent 25rem),
      radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.1), transparent 30rem),
      linear-gradient(145deg, #02030a 0%, #08111c 48%, #030509 100%);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.5;
  }

  body::before {
    position: fixed;
    inset: 0;
    pointer-events: none;
    content: "";
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
    background-size: 72px 72px;
    mask-image: radial-gradient(circle at center, black, transparent 72%);
  }

  .lock-shell {
    width: min(760px, 100%);
  }

  .glass-card {
    position: relative;
    display: grid;
    gap: clamp(30px, 6vw, 54px);
    min-height: min(720px, calc(100vh - 64px));
    padding: clamp(34px, 7vw, 72px);
    border: 1px solid var(--line);
    border-radius: clamp(30px, 6vw, 54px);
    overflow: hidden;
    background:
      linear-gradient(145deg, rgba(255, 255, 255, 0.17), rgba(255, 255, 255, 0.05)),
      rgba(6, 10, 16, 0.62);
    box-shadow:
      0 36px 120px rgba(0, 0, 0, 0.52),
      inset 0 1px 0 rgba(255, 255, 255, 0.34),
      inset 0 -1px 0 rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(36px) saturate(160%);
  }

  .glass-card::before {
    position: absolute;
    inset: 1px;
    border-radius: inherit;
    pointer-events: none;
    content: "";
    background:
      linear-gradient(130deg, rgba(255, 255, 255, 0.26), transparent 34%),
      radial-gradient(circle at 84% 12%, rgba(226, 244, 255, 0.16), transparent 18rem);
  }

  .glass-card > * {
    position: relative;
  }

  .ws-dot {
    position: absolute;
    top: 28px;
    right: 30px;
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: rgba(255, 185, 189, 0.7);
    box-shadow: 0 0 22px rgba(255, 185, 189, 0.45);
    transition: background 180ms ease, box-shadow 180ms ease;
  }

  .ws-dot.connected {
    background: rgba(185, 255, 217, 0.82);
    box-shadow: 0 0 24px rgba(185, 255, 217, 0.48);
  }

  h1 {
    max-width: 9ch;
    font-size: clamp(4.2rem, 14vw, 9.4rem);
    font-weight: 820;
    line-height: 0.78;
    letter-spacing: -0.095em;
    text-wrap: balance;
  }

  .intent-form {
    display: grid;
    gap: 14px;
    align-self: end;
  }

  .input-label,
  .section-label {
    color: var(--muted);
    font-size: clamp(0.9rem, 2vw, 1.02rem);
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .input-wrap {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 8px 8px 8px 22px;
    border: 1px solid var(--line);
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.085);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.17),
      0 18px 60px rgba(0, 0, 0, 0.24);
    transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
  }

  .input-wrap:focus-within {
    border-color: rgba(255, 255, 255, 0.56);
    background: rgba(255, 255, 255, 0.13);
    box-shadow:
      0 0 0 5px rgba(255, 255, 255, 0.07),
      0 18px 60px rgba(0, 0, 0, 0.28);
  }

  input[type="text"] {
    width: 100%;
    min-width: 0;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: clamp(1.1rem, 3vw, 1.45rem);
  }

  input[type="text"]::placeholder {
    color: var(--faint);
  }

  input[type="text"]:disabled {
    cursor: wait;
    opacity: 0.62;
  }

  .enter-key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 68px;
    padding: 11px 16px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: rgba(248, 251, 255, 0.76);
    font-size: 0.88rem;
    font-weight: 750;
    background: rgba(255, 255, 255, 0.1);
  }

  .session-view {
    display: none;
    align-self: stretch;
    gap: 26px;
  }

  body.session-active .intent-form {
    display: none;
  }

  body.session-active .session-view {
    display: grid;
  }

  .session-top {
    display: grid;
    gap: 10px;
  }

  #session-intent {
    color: var(--text);
    font-size: clamp(2.1rem, 6vw, 4.2rem);
    font-weight: 800;
    line-height: 0.96;
    letter-spacing: -0.065em;
  }

  #session-meta {
    color: var(--faint);
    font-size: 0.92rem;
  }

  .now-card,
  .activity-card {
    border: 1px solid rgba(255, 255, 255, 0.135);
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.075);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .now-card {
    display: grid;
    gap: 10px;
    padding: 20px;
  }

  #latest-message {
    color: rgba(248, 251, 255, 0.84);
    font-size: clamp(1rem, 2vw, 1.14rem);
  }

  #latest-message.on-track {
    color: var(--green);
  }

  #latest-message.off-track {
    color: var(--red);
  }

  .activity-card {
    display: grid;
    gap: 14px;
    min-height: 210px;
    max-height: 320px;
    padding: 20px;
    overflow: hidden;
  }

  .event-list {
    display: grid;
    gap: 10px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .event-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 2px 12px;
    padding: 12px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(248, 251, 255, 0.82);
  }

  .event-item:first-child {
    border-top: 0;
    padding-top: 0;
  }

  .event-time {
    color: var(--faint);
    font-size: 0.8rem;
  }

  .event-desc {
    min-width: 0;
  }

  .event-item.triggered .event-desc {
    color: var(--blue);
  }

  .empty {
    color: var(--faint);
    font-size: 0.96rem;
  }

  .session-actions {
    display: flex;
    justify-content: flex-end;
  }

  .btn {
    border: 0;
    font: inherit;
    cursor: pointer;
  }

  .btn[hidden] {
    display: none;
  }

  .btn-dim {
    padding: 13px 18px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(248, 251, 255, 0.86);
    font-size: 0.95rem;
    font-weight: 750;
    transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
  }

  .btn-dim:hover:not(:disabled) {
    transform: translateY(-1px);
    border-color: var(--line-strong);
    background: rgba(255, 255, 255, 0.14);
  }

  .btn-dim:disabled {
    cursor: wait;
    opacity: 0.62;
  }

  .hidden-state,
  .event-source,
  .rel-badge,
  #checkpoint-popup {
    display: none !important;
  }

  @media (max-width: 640px) {
    body {
      place-items: stretch;
      overflow: auto;
    }

    .glass-card {
      min-height: calc(100vh - 36px);
      border-radius: 30px;
    }

    .input-wrap {
      grid-template-columns: 1fr;
      padding: 18px;
    }

    .enter-key {
      justify-self: start;
    }
  }
</style>
</head>
<body>

<main class="lock-shell">
  <section class="glass-card">
    <div class="ws-dot" id="ws-dot" aria-hidden="true"></div>

    <h1>Ready to lock in?</h1>

    <form class="intent-form" id="intent-form">
      <label class="input-label" for="intent-input">What are you working on?</label>
      <div class="input-wrap">
        <input id="intent-input" type="text" placeholder="What are you working on?" autocomplete="off">
        <span class="enter-key">Enter</span>
      </div>
    </form>

    <section class="session-view" aria-live="polite">
      <div class="session-top">
        <p class="section-label">Locked in on</p>
        <div id="session-intent">No active session</div>
        <div id="session-meta"></div>
      </div>

      <div class="now-card">
        <p class="section-label">The thing</p>
        <div id="latest-message">No focus message yet.</div>
      </div>

      <div class="activity-card">
        <p class="section-label">Things you did</p>
        <div class="event-list" id="event-list">
          <div class="empty">Waiting for signals...</div>
        </div>
      </div>

      <div class="session-actions">
        <button class="btn btn-dim" id="btn-end" type="button">End session</button>
      </div>
    </section>

    <div class="hidden-state" aria-hidden="true">
      <span id="agent-status">Agent is thinking...</span>
      <span id="reasoning-count"></span>
      <div id="reasoning-history"></div>
      <div id="intervention-list"></div>
      <table id="memory-table"><tbody></tbody></table>
      <span id="m-precision"></span>
      <span id="m-false-alarm"></span>
      <span id="m-confidence"></span>
      <span id="m-checks"></span>
    </div>
  </section>
</main>

<div id="checkpoint-popup" aria-hidden="true">
  <div id="cp-msg"></div>
  <span id="cp-timer">60</span>
  <button class="btn" id="btn-continue" type="button">Continue focus</button>
  <button class="btn" id="btn-switch" type="button">Switch task</button>
</div>

<script>
  const selectedMode = 'deep';
  let ws = null;
  let sessionStartTime = null;
  let sessionTimerInterval = null;
  let checkpointTimerInterval = null;
  let sessionActive = false;
  let activeDriftCheckId = null;
  let recentEventEls = [];

  const $ = (id) => document.getElementById(id);

  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => {
      $('ws-dot').classList.add('connected');
    };

    ws.onclose = () => {
      $('ws-dot').classList.remove('connected');
      setTimeout(connect, 2000);
    };

    ws.onmessage = (event) => {
      handleMessage(JSON.parse(event.data));
    };
  }

  function handleMessage(message) {
    switch (message.type) {
      case 'session_started':
        onSessionStarted(message);
        break;
      case 'session_ended':
        onSessionEnded();
        break;
      case 'new_event':
        addEventRow(message.source, message.event_type, message.payload);
        break;
      case 'agent_thinking':
        break;
      case 'reasoning_update':
        handleReasoning(message);
        break;
      case 'checkpoint_fired':
        showCheckpoint(message);
        break;
      case 'checkpoint_response':
        addActivity(`Checkpoint response: ${message.response || 'recorded'}`);
        break;
      case 'focus_message':
        if (sessionActive) renderFocusMessage(message.message);
        break;
      case 'agent_error':
        addActivity(message.message || 'Anchor hit an error.');
        break;
    }
  }

  function onSessionStarted(message) {
    sessionActive = true;
    document.body.classList.add('session-active');
    $('session-intent').textContent = message.intent || 'Focus session';
    sessionStartTime = message.started_at ? new Date(`${message.started_at}Z`).getTime() : Date.now();
    clearInterval(sessionTimerInterval);
    sessionTimerInterval = setInterval(updateTimer, 1000);
    updateTimer();
    renderFocusMessage(null);
  }

  function onSessionEnded() {
    sessionActive = false;
    document.body.classList.remove('session-active');
    $('session-intent').textContent = 'No active session';
    $('session-meta').textContent = '';
    $('intent-input').disabled = false;
    $('btn-end').disabled = false;
    clearInterval(sessionTimerInterval);
    sessionStartTime = null;
    renderFocusMessage(null);
    resetActivityList();
    $('intent-input').focus();
  }

  function updateTimer() {
    if (!sessionStartTime) return;
    const elapsed = Math.max(0, Math.floor((Date.now() - sessionStartTime) / 1000));
    const minutes = Math.floor(elapsed / 60);
    const seconds = elapsed % 60;
    $('session-meta').textContent = `${selectedMode.toUpperCase()} - ${minutes}:${seconds.toString().padStart(2, '0')} elapsed`;
  }

  $('intent-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const input = $('intent-input');
    const intent = input.value.trim();
    if (!intent) {
      input.focus();
      return;
    }

    input.disabled = true;
    try {
      const response = await fetch('/session/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ intent, mode: selectedMode }),
      });

      if (!response.ok) throw new Error('Unable to start session.');
      input.value = '';
      resetActivityList();
      onSessionStarted({ intent, mode: selectedMode });
    } catch (error) {
      addActivity(error instanceof Error ? error.message : 'Unable to start session.');
      input.disabled = false;
      input.focus();
    }
  });

  $('btn-end').addEventListener('click', async () => {
    $('btn-end').disabled = true;
    try {
      const response = await fetch('/session/end', { method: 'POST' });
      if (!response.ok) throw new Error('Unable to end session.');
      onSessionEnded();
    } catch (error) {
      addActivity(error instanceof Error ? error.message : 'Unable to end session.');
      $('btn-end').disabled = false;
    }
  });

  function resetActivityList() {
    recentEventEls = [];
    $('event-list').innerHTML = '<div class="empty">Waiting for signals...</div>';
  }

  function addEventRow(source, type, payload) {
    addActivity(formatEventDesc(type, payload), source);
  }

  function addActivity(description, source = 'anchor') {
    const list = $('event-list');
    const empty = list.querySelector('.empty');
    if (empty) empty.remove();

    const item = document.createElement('div');
    item.className = 'event-item';
    item.dataset.desc = description;
    item.dataset.domain = getDomainFromDescription(description);

    const time = document.createElement('span');
    time.className = 'event-time';
    time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const desc = document.createElement('span');
    desc.className = 'event-desc';
    desc.textContent = description;

    const sourceLabel = document.createElement('span');
    sourceLabel.className = `event-source src-${source}`;
    sourceLabel.textContent = source;

    item.append(time, desc, sourceLabel);
    list.prepend(item);
    recentEventEls.unshift(item);
    if (recentEventEls.length > 10) recentEventEls.pop();
    while (list.children.length > 24) list.removeChild(list.lastChild);
  }

  function getDomainFromDescription(description) {
    const match = description.match(/^([a-z0-9.-]+\.[a-z]{2,})/i);
    return match ? match[1] : '';
  }

  function formatEventDesc(type, payload = {}) {
    if (type === 'tab_change' || type === 'tab_active') {
      const domain = payload.domain || 'unknown';
      const duration = Math.round(payload.durationSec || payload.duration_sec || 0);
      const title = payload.title ? ` - ${payload.title.slice(0, 48)}${payload.title.length > 48 ? '...' : ''}` : '';
      return `${domain} for ${duration}s${title}`;
    }
    if (type === 'accel_snapshot') return payload.summary || 'Motion changed';
    if (type === 'idle') return `Idle for ${Math.round(payload.duration_sec || 0)}s`;
    if (type === 'app_switch') return `${payload.from || '?'} to ${payload.to || '?'}`;
    return JSON.stringify(payload).slice(0, 72);
  }

  function renderFocusMessage(message) {
    const element = $('latest-message');
    if (!message || !message.message) {
      element.textContent = sessionActive ? 'Locked. Waiting for the first focus check.' : 'No focus message yet.';
      element.className = '';
      return;
    }
    element.textContent = message.message;
    element.className = message.userOnTrack ? 'on-track' : 'off-track';
  }

  function handleReasoning(message) {
    if (message.is_drift) {
      recentEventEls.slice(0, 5).forEach((element) => {
        element.classList.add('triggered');
        setTimeout(() => element.classList.remove('triggered'), 4000);
      });
    }
  }

  function showCheckpoint(message) {
    activeDriftCheckId = message.drift_check_id;
    $('cp-msg').textContent = message.message || '';
    let remaining = 60;
    $('cp-timer').textContent = remaining;
    clearInterval(checkpointTimerInterval);
    checkpointTimerInterval = setInterval(() => {
      remaining -= 1;
      $('cp-timer').textContent = remaining;
      if (remaining <= 0) {
        clearInterval(checkpointTimerInterval);
        sendResponse('ignored');
      }
    }, 1000);
  }

  function hideCheckpoint() {
    clearInterval(checkpointTimerInterval);
    activeDriftCheckId = null;
  }

  async function sendResponse(response) {
    if (activeDriftCheckId == null) return;
    const id = activeDriftCheckId;
    hideCheckpoint();
    await fetch(`/checkpoint/${id}/response`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ response }),
    });
  }

  $('btn-continue').addEventListener('click', () => sendResponse('continue'));
  $('btn-switch').addEventListener('click', () => sendResponse('switch'));

  connect();

  fetch('/session/current')
    .then((response) => response.json())
    .then((session) => {
      if (session && session.intent) onSessionStarted(session);
      else $('intent-input').focus();
    })
    .catch(() => {
      $('intent-input').focus();
    });
</script>
</body>
</html>
